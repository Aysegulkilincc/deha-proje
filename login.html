<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>DEHA | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #faf5ff 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800">DEHA</h1>
            <p class="text-slate-500 font-medium mt-2">Bebeğinizin sağlığına bir adım daha yakınlaşın.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <input type="email" id="email" placeholder="E-posta Adresiniz" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
            <input type="password" id="password" placeholder="Şifreniz" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-400 outline-none transition-all">

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all transform hover:scale-[1.02]">
                Giriş Yap
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('https://deha-backend-7tgz.onrender.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();
            if (response.ok) {
                localStorage.setItem('user', JSON.stringify(result.user)); // Kullanıcıyı hatırla
                window.location.href = 'index.html'; // Dashboard'a yönlendir
            } else {
                alert(result.message);
            }
        });
    </script>
</body>

</html>
