<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>DEHA | Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #faf5ff 100%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800">DEHA</h1>
            <p class="text-slate-500 font-medium mt-2">Sisteme ilk kaydınızı oluşturun.</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <input type="text" id="name" placeholder="Adınız Soyadınız" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 outline-none">
            <input type="text" id="baby_name" placeholder="Bebeğinizin Adı" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 outline-none">
            <input type="email" id="email" placeholder="E-posta Adresiniz" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 outline-none">
            <input type="password" id="password" placeholder="Şifrenizi Belirleyin" required
                class="w-full px-6 py-4 rounded-2xl border-none ring-1 ring-slate-200 outline-none">

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">
                Kayıt Ol ve Başlat
            </button>
        </form>
        <p class="text-center mt-4 text-sm text-slate-400">Zaten hesabınız var mı? <a href="login.html"
                class="text-indigo-600 font-bold">Giriş Yap</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const baby_name = document.getElementById('baby_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('https://deha-backend-7tgz.onrender.com/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, baby_name, email, password })
            });

            const result = await response.json();
            alert(result.message);
            if (response.ok) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
